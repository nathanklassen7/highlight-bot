<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-white shadow-sm">
        <div class="max-w-xl mx-auto py-4 px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-900">WiFi Settings</h1>
            <a href="/" class="text-blue-600 hover:text-blue-800 text-sm">&larr; Back</a>
        </div>
    </header>

    <main class="max-w-xl mx-auto py-6 px-4">
        <div id="status-bar" class="mb-6 p-4 bg-white rounded-lg shadow-sm">
            <div class="flex justify-between items-center">
                <div>
                    <span class="text-sm text-gray-500">Status:</span>
                    <span id="status-text" class="ml-1 font-medium">Checking...</span>
                </div>
                <button onclick="enableHotspot()" id="hotspot-btn"
                    class="hidden px-3 py-1.5 text-sm bg-yellow-500 text-white rounded hover:bg-yellow-600">
                    Switch to Hotspot
                </button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm overflow-hidden mb-6">
            <div class="p-4">
                <h2 class="text-lg font-semibold mb-3">Connect to WiFi</h2>
                <div class="space-y-3">
                    <input type="text" id="manual-ssid" placeholder="Network name (SSID)"
                        class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="password" id="manual-password" placeholder="Password (leave blank if open)"
                        class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="connectWifi()" id="connect-btn"
                        class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Connect</button>
                    <p class="text-xs text-gray-500 text-center">If connection fails, the hotspot will reopen automatically.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function getStatus() {
            try {
                const res = await fetch('/api/wifi/status');
                const data = await res.json();
                const el = document.getElementById('status-text');
                const btn = document.getElementById('hotspot-btn');

                if (data.mode === 'hotspot') {
                    el.innerHTML = '<span class="text-yellow-600">Hotspot (HighlightBot)</span>';
                    btn.classList.add('hidden');
                } else if (data.mode === 'connected') {
                    el.innerHTML = `<span class="text-green-600">Connected to ${data.ssid}</span>`;
                    btn.classList.remove('hidden');
                } else {
                    el.innerHTML = '<span class="text-red-600">Disconnected</span>';
                    btn.classList.remove('hidden');
                }
            } catch (e) {
                document.getElementById('status-text').innerHTML = '<span class="text-red-600">Unreachable</span>';
            }
        }

        async function connectWifi() {
            const ssid = document.getElementById('manual-ssid').value.trim();
            const password = document.getElementById('manual-password').value;
            if (!ssid) { alert('Enter a network name'); return; }

            const btn = document.getElementById('connect-btn');
            btn.disabled = true;
            btn.textContent = 'Connecting...';

            try {
                await fetch('/api/wifi/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ssid, password })
                });
            } catch (e) { }

            alert('Connection attempt sent. This page will become unreachable while the bot switches networks.\n\nIf it fails, the hotspot will reopen automatically.');
            btn.disabled = false;
            btn.textContent = 'Connect';
        }

        async function enableHotspot() {
            if (!confirm('Switch to hotspot mode? You will lose WiFi internet.')) return;
            try {
                await fetch('/api/wifi/hotspot', { method: 'POST' });
            } catch (e) { }
            alert('Switching to hotspot. Reconnect to HighlightBot WiFi to access this page.');
        }

        getStatus();
    </script>
</body>
</html>
