<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Config</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-white shadow-sm">
        <div class="max-w-xl mx-auto py-4 px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-900">Camera Config</h1>
            <a href="/" class="text-blue-600 hover:text-blue-800 text-sm">&larr; Home</a>
        </div>
    </header>

    <main class="max-w-xl mx-auto py-6 px-4 space-y-6">
        <div id="error-bar" class="hidden p-3 bg-red-100 text-red-700 rounded-lg text-sm"></div>
        <div id="success-bar" class="hidden p-3 bg-green-100 text-green-700 rounded-lg text-sm"></div>

        <div class="bg-white rounded-lg shadow-sm p-4">
            <h2 class="font-semibold text-gray-900 mb-3">Resolution Preset</h2>
            <div id="presets" class="grid grid-cols-2 gap-2"></div>
        </div>

        <div id="fields" class="space-y-3"></div>

        <div id="timeout-section" class="bg-white rounded-lg shadow-sm p-4">
            <div class="flex justify-between items-center mb-2">
                <label class="font-medium text-gray-900">Inactivity Timeout (hours)</label>
                <button onclick="saveTimeout()"
                    class="px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">Save</button>
            </div>
            <input type="number" step="any" id="timeout-input"
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button onclick="resetConfig()"
            class="w-full p-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700">
            Reset to Defaults
        </button>
    </main>

    <script>
        let configData = {};

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                configData = await res.json();
                renderPresets();
                renderFields();
                renderTimeout();
            } catch (e) {
                showError('Failed to load config');
            }
        }

        function renderPresets() {
            const container = document.getElementById('presets');
            container.innerHTML = configData.presets.map(name => {
                const active = name === configData.current_preset;
                const cls = active
                    ? 'p-3 rounded-lg font-semibold text-white bg-blue-600'
                    : 'p-3 rounded-lg font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 cursor-pointer';
                return `<button onclick="applyPreset('${name}')" class="${cls}" ${active ? 'disabled' : ''}>${name}</button>`;
            }).join('');
        }

        function renderFields() {
            const container = document.getElementById('fields');
            container.innerHTML = configData.fields.map(f => {
                let input;
                if (f.type === 'bool') {
                    input = `
                        <select data-key="${f.key}"
                            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="true" ${f.value === true ? 'selected' : ''}>On</option>
                            <option value="false" ${f.value === false ? 'selected' : ''}>Off</option>
                        </select>`;
                } else {
                    const inputType = f.type === 'float' ? 'number' : (f.type === 'int' ? 'number' : 'text');
                    const step = f.type === 'float' ? 'any' : '1';
                    const val = f.value !== null && f.value !== undefined ? f.value : '';
                    input = `
                        <input type="${inputType}" step="${step}" data-key="${f.key}" value="${val}"
                            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">`;
                }
                return `
                    <div class="bg-white rounded-lg shadow-sm p-4">
                        <div class="flex justify-between items-center mb-2">
                            <label class="font-medium text-gray-900">${f.label}</label>
                            <button onclick="saveField('${f.key}')"
                                class="px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">Save</button>
                        </div>
                        ${input}
                    </div>`;
            }).join('');
        }

        function renderTimeout() {
            const input = document.getElementById('timeout-input');
            if (configData.timeout_hours !== null) {
                input.value = configData.timeout_hours;
            }
        }

        async function saveTimeout() {
            const value = document.getElementById('timeout-input').value;
            hideBars();
            try {
                const res = await fetch('/api/config/timeout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value })
                });
                const data = await res.json();
                if (data.error) {
                    showError(data.error);
                } else {
                    showSuccess('Timeout saved');
                    loadConfig();
                }
            } catch (e) {
                showError('Failed to save timeout');
            }
        }

        async function applyPreset(name) {
            hideBars();
            try {
                const res = await fetch('/api/config/preset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ preset: name })
                });
                const data = await res.json();
                if (data.error) {
                    showError(data.error);
                } else {
                    showSuccess('Preset applied: ' + name);
                    loadConfig();
                }
            } catch (e) {
                showError('Failed to apply preset');
            }
        }

        async function saveField(key) {
            const el = document.querySelector(`[data-key="${key}"]`);
            const value = el.value;
            hideBars();

            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, value })
                });
                const data = await res.json();
                if (data.error) {
                    showError(data.error);
                } else {
                    showSuccess('Saved');
                    loadConfig();
                }
            } catch (e) {
                showError('Failed to save');
            }
        }

        async function resetConfig() {
            if (!confirm('Reset all config values to defaults?')) return;
            hideBars();

            try {
                const res = await fetch('/api/config/reset', { method: 'POST' });
                const data = await res.json();
                if (data.error) {
                    showError(data.error);
                } else {
                    showSuccess('Config reset to defaults');
                    loadConfig();
                }
            } catch (e) {
                showError('Failed to reset');
            }
        }

        function showError(msg) {
            hideBars();
            const el = document.getElementById('error-bar');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function showSuccess(msg) {
            hideBars();
            const el = document.getElementById('success-bar');
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        function hideBars() {
            document.getElementById('error-bar').classList.add('hidden');
            document.getElementById('success-bar').classList.add('hidden');
        }

        loadConfig();
    </script>
</body>
</html>
