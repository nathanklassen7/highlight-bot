<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        #snapshot { width: 100%; border-radius: 0.5rem; background: #111; min-height: 180px; object-fit: contain; }
        .field-row { display: flex; align-items: center; gap: 0.5rem; }
        .field-row label { flex: 1; font-size: 0.875rem; font-weight: 500; color: #374151; white-space: nowrap; }
        .field-row input, .field-row select { width: 7rem; padding: 0.375rem 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 1rem; }
        .field-row input:focus, .field-row select:focus { outline: none; ring: 2px; border-color: #3b82f6; }
        .save-btn { padding: 0.375rem 0.75rem; font-size: 0.75rem; background: #2563eb; color: white; border-radius: 0.375rem; border: none; cursor: pointer; }
        .save-btn:hover { background: #1d4ed8; }
        #toast {
            position: fixed;
            top: 0.75rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            z-index: 50;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        #toast.hidden { opacity: 0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-white shadow-sm">
        <div class="max-w-xl mx-auto py-3 px-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-900">Camera</h1>
            <a href="/" class="text-blue-600 hover:text-blue-800 text-sm">&larr; Home</a>
        </div>
    </header>

    <div id="toast" class="hidden"></div>

    <main class="max-w-xl mx-auto py-4 px-4 space-y-4">
        <div class="bg-black rounded-lg overflow-hidden">
            <img id="snapshot" alt="Camera snapshot">
        </div>
        <button onclick="refreshSnapshot()" id="refresh-btn"
            class="w-full p-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 text-sm">
            Refresh Snapshot
        </button>

        <div id="recording-notice" class="hidden p-3 bg-yellow-100 text-yellow-800 rounded-lg text-sm font-medium text-center">
            Stop recording to edit camera config.
        </div>

        <div id="camera-config">
            <div class="space-y-4">
                <div class="bg-white rounded-lg shadow-sm p-3">
                    <h2 class="font-semibold text-gray-900 mb-2 text-sm">Preset</h2>
                    <div id="presets" class="grid grid-cols-3 gap-1.5"></div>
                </div>

                <div class="bg-white rounded-lg shadow-sm p-3 space-y-2" id="fields"></div>

                <button onclick="resetConfig()"
                    class="w-full p-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700 text-sm">
                    Reset to Defaults
                </button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm p-3">
            <div class="field-row">
                <label>Timeout (hours)</label>
                <input type="number" step="any" id="timeout-input">
                <button class="save-btn" onclick="saveTimeout()">Save</button>
            </div>
        </div>
    </main>

    <script>
        let configData = {};

        async function refreshSnapshot() {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.textContent = 'Capturing...';
            try {
                const res = await fetch('/api/snapshot', { method: 'POST' });
                const data = await res.json();
                if (data.status === 'ok') {
                    document.getElementById('snapshot').src = '/api/snapshot?' + data.ts;
                } else {
                    showError('Snapshot failed');
                }
            } catch (e) {
                showError('Failed to capture frame');
            }
            btn.disabled = false;
            btn.textContent = 'Refresh Snapshot';
        }

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                configData = await res.json();
                renderPresets();
                renderFields();
                renderTimeout();
            } catch (e) {
                showError('Failed to load config');
            }
        }

        function renderPresets() {
            const container = document.getElementById('presets');
            container.innerHTML = configData.presets.map(name => {
                const active = name === configData.current_preset;
                const cls = active
                    ? 'p-2 rounded text-xs font-semibold text-white bg-blue-600'
                    : 'p-2 rounded text-xs font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 cursor-pointer';
                return `<button onclick="applyPreset('${name}')" class="${cls}" ${active ? 'disabled' : ''}>${name}</button>`;
            }).join('');
        }

        function renderFields() {
            const container = document.getElementById('fields');
            container.innerHTML = configData.fields.map(f => {
                let input;
                if (f.type === 'bool') {
                    input = `<select data-key="${f.key}">
                        <option value="true" ${f.value === true ? 'selected' : ''}>On</option>
                        <option value="false" ${f.value === false ? 'selected' : ''}>Off</option>
                    </select>`;
                } else {
                    const inputType = f.type === 'float' ? 'number' : 'number';
                    const step = f.type === 'float' ? 'any' : '1';
                    const val = f.value !== null && f.value !== undefined ? f.value : '';
                    input = `<input type="${inputType}" step="${step}" data-key="${f.key}" value="${val}">`;
                }
                return `<div class="field-row">
                    <label>${f.label}</label>
                    ${input}
                    <button class="save-btn" onclick="saveField('${f.key}')">Save</button>
                </div>`;
            }).join('');
        }

        function renderTimeout() {
            const input = document.getElementById('timeout-input');
            if (configData.timeout_hours !== null) {
                input.value = configData.timeout_hours;
            }
        }

        async function saveTimeout() {
            const value = document.getElementById('timeout-input').value;
            hideBars();
            try {
                const res = await fetch('/api/config/timeout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value })
                });
                const data = await res.json();
                if (data.error) showError(data.error);
                else { showSuccess('Timeout saved'); loadConfig(); }
            } catch (e) { showError('Failed to save timeout'); }
        }

        async function applyPreset(name) {
            hideBars();
            try {
                const res = await fetch('/api/config/preset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ preset: name })
                });
                const data = await res.json();
                if (data.error) showError(data.error);
                else { showSuccess('Preset: ' + name); loadConfig(); refreshSnapshot(); }
            } catch (e) { showError('Failed to apply preset'); }
        }

        async function saveField(key) {
            const el = document.querySelector(`[data-key="${key}"]`);
            const value = el.value;
            hideBars();
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, value })
                });
                const data = await res.json();
                if (data.error) showError(data.error);
                else { showSuccess('Saved'); loadConfig(); refreshSnapshot(); }
            } catch (e) { showError('Failed to save'); }
        }

        async function resetConfig() {
            if (!confirm('Reset all config values to defaults?')) return;
            hideBars();
            try {
                const res = await fetch('/api/config/reset', { method: 'POST' });
                const data = await res.json();
                if (data.error) showError(data.error);
                else { showSuccess('Config reset'); loadConfig(); refreshSnapshot(); }
            } catch (e) { showError('Failed to reset'); }
        }

        let toastTimer;
        function showToast(msg, isError) {
            const el = document.getElementById('toast');
            clearTimeout(toastTimer);
            el.textContent = msg;
            el.style.background = isError ? '#fee2e2' : '#dcfce7';
            el.style.color = isError ? '#b91c1c' : '#15803d';
            el.classList.remove('hidden');
            toastTimer = setTimeout(() => el.classList.add('hidden'), 3000);
        }

        function showError(msg) { showToast(msg, true); }
        function showSuccess(msg) { showToast(msg, false); }
        function hideBars() { document.getElementById('toast').classList.add('hidden'); }

        async function updateConfigVisibility() {
            try {
                const res = await fetch('/api/bot/status');
                const data = await res.json();
                const isIdle = data.state === 'IDLE';
                document.getElementById('camera-config').classList.toggle('hidden', !isIdle);
                document.getElementById('recording-notice').classList.toggle('hidden', isIdle);
            } catch (e) {}
        }

        refreshSnapshot();
        loadConfig();
        updateConfigVisibility();
        setInterval(updateConfigVisibility, 2000);
    </script>
</body>
</html>
